version: "3.8"
services:
  app:
    image: node:18-alpine
    restart: always
    env_file: .env
    ports:
      - "8080:3000"
    depends_on:
      - db
      - redis

  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASS}
      MYSQL_DATABASE: ${DB_NAME}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --requirepass ${REDIS_PASS}
    ports:
      - "6379:6379"

volumes:
  db_data:
